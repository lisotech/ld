<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisotech Digital | Free Facebook Acceleration Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-indigo-500 selection:text-white">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 text-white p-2 rounded-lg font-bold text-sm tracking-wider">LD</div>
                <span class="font-extrabold text-xl bg-gradient-to-r from-indigo-600 to-blue-600 bg-clip-text text-transparent">Lisotech Digital</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200">
                    <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> Server Status: Active
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Tool Container -->
    <main class="max-w-xl mx-auto px-4 py-12 sm:py-20">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Free Engagement Panel</h1>
            <p class="text-sm text-slate-500 mt-2">Test our platform network capabilities with no fees or card requirements.</p>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-6 sm:p-8 shadow-xl shadow-slate-100 relative overflow-hidden">
            
            <!-- Channel Switcher -->
            <div class="mb-5">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">1. Delivery Goal</label>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-followers" onclick="setChannel('followers')" class="py-3 px-4 border-2 border-indigo-600 bg-indigo-50/50 text-indigo-700 font-bold rounded-xl text-xs transition text-center cursor-pointer">
                        Facebook Followers
                    </button>
                    <button id="btn-likes" onclick="setChannel('likes')" class="py-3 px-4 border border-slate-200 text-slate-600 font-semibold rounded-xl text-xs transition text-center cursor-pointer">
                        Facebook Post Likes
                    </button>
                </div>
            </div>

            <!-- Link Box -->
            <div class="mb-5">
                <label for="target-url" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">2. Target Link / URL</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-link text-sm"></i>
                    </div>
                    <input type="url" id="target-url" placeholder="https://facebook.com/your-profile-or-post" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-hidden focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition placeholder:text-slate-400">
                </div>
            </div>

            <!-- Count Box -->
            <div class="mb-6">
                <label for="target-number" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">3. Target Number <span class="text-slate-400 normal-case font-normal">(Max 500 per request)</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-arrow-trend-up text-sm"></i>
                    </div>
                    <input type="number" id="target-number" min="10" max="500" value="100" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-hidden focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-600 transition">
                </div>
            </div>

            <!-- Execution Status Panel (Hidden initially) -->
            <div id="status-panel" class="hidden mb-6 bg-slate-900 text-slate-200 p-4 rounded-xl font-mono text-xs space-y-1.5 transition-all">
                <p class="text-indigo-400 font-bold">> Booting cluster network matrix...</p>
                <p id="status-link" class="truncate">> Target: undefined</p>
                <p id="status-action">> Handshaking secure channel...</p>
            </div>

            <!-- Action Trigger -->
            <button id="submit-btn" onclick="startGeneration()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-md shadow-indigo-600/10 flex items-center justify-center gap-2 cursor-pointer">
                <i class="fa-solid fa-circle-play text-sm"></i> Deploy Free Growth Package
            </button>
        </div>

        <!-- Info Guard -->
        <div class="mt-6 flex gap-3 items-center justify-center text-xs text-slate-400 font-medium">
            <span><i class="fa-solid fa-lock text-slate-400 mr-1"></i> No Account Passwords Required</span>
            <span>&bull;</span>
            <span><i class="fa-solid fa-user-secret text-slate-400 mr-1"></i> Private Routing Encryption</span>
        </div>
    </main>

    <!-- Logic Engine -->
    <script>
        let selectedChannel = 'followers';

        function setChannel(channel) {
            selectedChannel = channel;
            const btnF = document.getElementById('btn-followers');
            const btnL = document.getElementById('btn-likes');
            const urlInput = document.getElementById('target-url');

            if(channel === 'followers') {
                btnF.className = "py-3 px-4 border-2 border-indigo-600 bg-indigo-50/50 text-indigo-700 font-bold rounded-xl text-xs transition text-center cursor-pointer";
                btnL.className = "py-3 px-4 border border-slate-200 text-slate-600 font-semibold rounded-xl text-xs transition text-center cursor-pointer";
                urlInput.placeholder = "https://facebook.com/your-profile-or-page";
            } else {
                btnL.className = "py-3 px-4 border-2 border-indigo-600 bg-indigo-50/50 text-indigo-700 font-bold rounded-xl text-xs transition text-center cursor-pointer";
                btnF.className = "py-3 px-4 border border-slate-200 text-slate-600 font-semibold rounded-xl text-xs transition text-center cursor-pointer";
                urlInput.placeholder = "https://facebook.com/permalink.php?story_fbid=...";
            }
        }

        function startGeneration() {
            const targetUrl = document.getElementById('target-url').value.trim();
            const count = parseInt(document.getElementById('target-number').value);
            const panel = document.getElementById('status-panel');
            const submitBtn = document.getElementById('submit-btn');

            if(!targetUrl) {
                alert('Please input a valid Facebook target link to receive delivery.');
                return;
            }

            if(isNaN(count) || count < 10 || count > 500) {
                alert('Please enter a delivery configuration volume between 10 and 500.');
                return;
            }

            // Disable buttons during execution run
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing Sequence...";
            submitBtn.className = "w-full bg-slate-300 text-slate-500 font-bold py-4 rounded-xl cursor-not-allowed flex items-center justify-center gap-2";
            
            // Show matrix dashboard console
            panel.classList.remove('hidden');
            document.getElementById('status-link').innerText = `> Destination Target: ${targetUrl}`;
            
            setTimeout(() => {
                document.getElementById('status-action').innerText = `> Syncing ${count} slots inside organic queues...`;
            }, 1200);

            setTimeout(() => {
                document.getElementById('status-action').innerHTML = `<span class="text-emerald-400 font-bold">> Success! Delivery allocated into node scheduler.</span>`;
                alert(`Transaction Successfully Routed!\n\n${count} Free ${selectedChannel.toUpperCase()} allocated to your target pipeline profile. Process completion takes roughly 15-45 minutes depending on load queues.`);
                
                // Reset state parameters
                submitBtn.disabled = false;
                submitBtn.className = "w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-md shadow-indigo-600/10 flex items-center justify-center gap-2 cursor-pointer";
                submitBtn.innerHTML = `<i class="fa-solid fa-circle-play text-sm"></i> Deploy Free Growth Package`;
                panel.classList.add('hidden');
                document.getElementById('target-url').value = '';
            }, 3500);
        }
    </script>
</body>
</html>
